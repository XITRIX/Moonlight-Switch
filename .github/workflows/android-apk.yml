name: Android APK

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_NDK_VERSION: 29.0.14206865
      ANDROID_CMAKE_VERSION: 3.22.1

    steps:
    - name: Check out repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Fetch vcpkg history and baseline
      shell: bash
      run: |
        manifest="app/platforms/android-project/app/jni/vcpkg.json"
        baseline="$(sed -nE 's/.*"builtin-baseline":[[:space:]]*"([0-9a-f]{40})".*/\1/p' "${manifest}" | head -n1)"

        if [ -z "${baseline}" ]; then
          echo "Unable to determine vcpkg builtin-baseline from ${manifest}"
          exit 1
        fi

        if git -C extern/vcpkg rev-parse --is-shallow-repository | grep -q true; then
          git -C extern/vcpkg fetch --force --prune --tags --unshallow origin \
            "+refs/heads/*:refs/remotes/origin/*"
        else
          git -C extern/vcpkg fetch --force --prune --tags origin \
            "+refs/heads/*:refs/remotes/origin/*"
        fi

        if ! git -C extern/vcpkg cat-file -e "${baseline}^{commit}" 2>/dev/null; then
          git -C extern/vcpkg fetch --force origin "${baseline}"
        fi

        git -C extern/vcpkg cat-file -e "${baseline}^{commit}"

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
        cache: gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK components
      shell: bash
      run: |
        set +o pipefail
        yes | sdkmanager --licenses > /dev/null
        set -o pipefail
        sdkmanager \
          "platform-tools" \
          "platforms;android-35" \
          "build-tools;35.0.0" \
          "cmake;${ANDROID_CMAKE_VERSION}" \
          "ndk;${ANDROID_NDK_VERSION}"

    - name: Install native build tools
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm

    - name: Prepare Android build environment
      shell: bash
      run: |
        chmod +x build_libromfs_generator.sh app/platforms/android-project/gradlew

        sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME}}"
        ndk_root="${sdk_root}/ndk/${ANDROID_NDK_VERSION}"
        cmake_root="${sdk_root}/cmake/${ANDROID_CMAKE_VERSION}"

        if [ -z "${sdk_root}" ] || [ ! -d "${sdk_root}" ]; then
          echo "Android SDK root could not be resolved"
          exit 1
        fi

        printf 'sdk.dir=%s\n' "${sdk_root}" > app/platforms/android-project/local.properties
        printf 'ndk.dir=%s\n' "${ndk_root}" >> app/platforms/android-project/local.properties
        printf 'cmake.dir=%s\n' "${cmake_root}" >> app/platforms/android-project/local.properties

        echo "ANDROID_SDK_ROOT=${sdk_root}" >> "$GITHUB_ENV"
        echo "ANDROID_HOME=${sdk_root}" >> "$GITHUB_ENV"
        echo "ANDROID_NDK_HOME=${ndk_root}" >> "$GITHUB_ENV"
        echo "ANDROID_NDK_ROOT=${ndk_root}" >> "$GITHUB_ENV"

    - name: Build libromfs-generator
      shell: bash
      run: ./build_libromfs_generator.sh

    - name: Bootstrap vcpkg
      shell: bash
      working-directory: extern/vcpkg
      run: ./bootstrap-vcpkg.sh -disableMetrics

    - name: Compute vcpkg cache key
      id: vcpkg-cache-key
      shell: bash
      run: |
        runner_os="${{ runner.os }}"
        manifest_hash="${{ hashFiles('app/platforms/android-project/app/jni/vcpkg.json', 'app/platforms/android-project/app/jni/vcpkg-configuration.json') }}"
        vcpkg_revision="$(git -C extern/vcpkg rev-parse HEAD)"
        triplets="arm-neon-android-arm64-android"

        echo "key=${runner_os}-android-vcpkg-${ANDROID_NDK_VERSION}-${ANDROID_CMAKE_VERSION}-${triplets}-${vcpkg_revision}-${manifest_hash}" >> "$GITHUB_OUTPUT"
        echo "restore-prefix=${runner_os}-android-vcpkg-${ANDROID_NDK_VERSION}-${ANDROID_CMAKE_VERSION}-${triplets}-${vcpkg_revision}-" >> "$GITHUB_OUTPUT"

    - name: Restore Android vcpkg cache
      id: vcpkg-cache
      uses: actions/cache/restore@v4
      with:
        path: |
          extern/vcpkg/buildtrees
          extern/vcpkg/downloads
          extern/vcpkg/installed
          extern/vcpkg/packages
        key: ${{ steps.vcpkg-cache-key.outputs.key }}
        restore-keys: |
          ${{ steps.vcpkg-cache-key.outputs.restore-prefix }}

    - name: Install Android vcpkg dependencies
      shell: bash
      working-directory: extern/vcpkg
      env:
        VCPKG_DISABLE_METRICS: 1
      run: |
        ./vcpkg install \
          --triplet arm-neon-android \
          --x-manifest-root "$GITHUB_WORKSPACE/app/platforms/android-project/app/jni" \
          --x-install-root "$GITHUB_WORKSPACE/extern/vcpkg/installed"

        ./vcpkg install \
          --triplet arm64-android \
          --x-manifest-root "$GITHUB_WORKSPACE/app/platforms/android-project/app/jni" \
          --x-install-root "$GITHUB_WORKSPACE/extern/vcpkg/installed"

    - name: Save Android vcpkg cache
      if: ${{ steps.vcpkg-cache.outputs.cache-hit != 'true' }}
      uses: actions/cache/save@v4
      with:
        path: |
          extern/vcpkg/buildtrees
          extern/vcpkg/downloads
          extern/vcpkg/installed
          extern/vcpkg/packages
        key: ${{ steps.vcpkg-cache-key.outputs.key }}

    - name: Build unsigned release APK
      shell: bash
      working-directory: app/platforms/android-project
      run: ./gradlew --no-daemon assembleRelease

    - name: Detect release signing configuration
      id: signing
      shell: bash
      env:
        ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets['ANDROID_RELEASE_KEYSTORE_BASE64'] }}
        ANDROID_RELEASE_KEY_ALIAS: ${{ secrets['ANDROID_RELEASE_KEY_ALIAS'] }}
        ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets['ANDROID_RELEASE_STORE_PASSWORD'] }}
        ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets['ANDROID_RELEASE_KEY_PASSWORD'] }}
      run: |
        if [ -n "$ANDROID_RELEASE_KEYSTORE_BASE64" ] && \
           [ -n "$ANDROID_RELEASE_KEY_ALIAS" ] && \
           [ -n "$ANDROID_RELEASE_STORE_PASSWORD" ] && \
           [ -n "$ANDROID_RELEASE_KEY_PASSWORD" ]; then
          echo "enabled=true" >> "$GITHUB_OUTPUT"
        else
          echo "enabled=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Sign release APK
      if: github.event_name != 'pull_request' && steps.signing.outputs.enabled == 'true'
      shell: bash
      working-directory: app/platforms/android-project
      env:
        ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets['ANDROID_RELEASE_KEYSTORE_BASE64'] }}
        ANDROID_RELEASE_KEY_ALIAS: ${{ secrets['ANDROID_RELEASE_KEY_ALIAS'] }}
        ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets['ANDROID_RELEASE_STORE_PASSWORD'] }}
        ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets['ANDROID_RELEASE_KEY_PASSWORD'] }}
      run: |
        keystore_path="$RUNNER_TEMP/android-release.keystore"
        unsigned_apk="app/build/outputs/apk/release/app-release-unsigned.apk"
        signed_apk="app/build/outputs/apk/release/app-release.apk"
        apksigner_bin="$ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner"

        printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"

        "$apksigner_bin" sign \
          --ks "$keystore_path" \
          --ks-key-alias "$ANDROID_RELEASE_KEY_ALIAS" \
          --ks-pass "pass:$ANDROID_RELEASE_STORE_PASSWORD" \
          --key-pass "pass:$ANDROID_RELEASE_KEY_PASSWORD" \
          --out "$signed_apk" \
          "$unsigned_apk"

        "$apksigner_bin" verify --verbose "$signed_apk"

    - name: Stage release APK artifact
      id: apk-artifact
      shell: bash
      working-directory: app/platforms/android-project
      run: |
        artifact_dir="$RUNNER_TEMP/moonlight-android-apk"
        signed_apk="app/build/outputs/apk/release/app-release.apk"
        unsigned_apk="app/build/outputs/apk/release/app-release-unsigned.apk"

        mkdir -p "$artifact_dir"

        if [ -f "$signed_apk" ]; then
          cp "$signed_apk" "$artifact_dir/Moonlight-android-release.apk"
          echo "artifact_name=Moonlight-android-release-apk" >> "$GITHUB_OUTPUT"
          echo "artifact_path=$artifact_dir/Moonlight-android-release.apk" >> "$GITHUB_OUTPUT"
        else
          cp "$unsigned_apk" "$artifact_dir/Moonlight-android-release-unsigned.apk"
          echo "artifact_name=Moonlight-android-release-unsigned-apk" >> "$GITHUB_OUTPUT"
          echo "artifact_path=$artifact_dir/Moonlight-android-release-unsigned.apk" >> "$GITHUB_OUTPUT"
          echo "::warning::Release APK is unsigned. Configure Android release signing secrets to produce an installable APK artifact."
        fi

    - name: Upload Android build logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: Moonlight-android-build-logs
        path: |
          app/platforms/android-project/app/.cxx/**/vcpkg-manifest-install.log
          app/platforms/android-project/app/.cxx/**/CMakeFiles/CMakeError.log
          app/platforms/android-project/app/.cxx/**/CMakeFiles/CMakeOutput.log
        if-no-files-found: ignore

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.apk-artifact.outputs.artifact_name }}
        path: ${{ steps.apk-artifact.outputs.artifact_path }}
        if-no-files-found: error
