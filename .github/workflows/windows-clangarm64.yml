name: Windows CLANGARM64

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-11-arm

    steps:
    - name: Check out repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up MSYS2 CLANGARM64
      uses: msys2/setup-msys2@v2
      with:
        location: 'C:\'
        msystem: CLANGARM64
        update: true
        install: >-
          mingw-w64-clang-aarch64-clang
          mingw-w64-clang-aarch64-cmake
          mingw-w64-clang-aarch64-ninja
          mingw-w64-clang-aarch64-pkgconf
          mingw-w64-clang-aarch64-SDL2
          mingw-w64-clang-aarch64-ffmpeg
          mingw-w64-clang-aarch64-curl
          mingw-w64-clang-aarch64-mbedtls
          mingw-w64-clang-aarch64-jansson
          mingw-w64-clang-aarch64-libpng
          mingw-w64-clang-aarch64-opus
          mingw-w64-clang-aarch64-expat
          mingw-w64-clang-aarch64-zstd
          mingw-w64-clang-aarch64-ntldd-git

    - name: Configure
      shell: pwsh
      run: C:\msys64\clangarm64\bin\cmake.exe --preset windows-clangarm64-release

    - name: Build
      shell: pwsh
      run: C:\msys64\clangarm64\bin\cmake.exe --build --preset windows-clangarm64-release --parallel

    - name: Collect runtime DLLs
      shell: msys2 {0}
      run: |
        exe="$(cygpath -u "$GITHUB_WORKSPACE")/build/windows-clangarm64/Moonlight.exe"
        outdir="$(dirname "$exe")"
        ntldd -R "$exe" | awk '/=> \/clangarm64\/bin\// { print $3 }' | sort -u | while read -r dll; do
          cp -f "$dll" "$outdir/"
        done

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Moonlight-windows-clangarm64
        path: |
          build/windows-clangarm64/Moonlight.exe
          build/windows-clangarm64/*.dll
          build/windows-clangarm64/resources/**