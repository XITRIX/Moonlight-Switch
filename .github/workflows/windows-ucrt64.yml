name: Windows UCRT64

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up MSYS2 UCRT64
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        release: false
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-ninja
          mingw-w64-ucrt-x86_64-pkgconf
          mingw-w64-ucrt-x86_64-SDL2
          mingw-w64-ucrt-x86_64-ffmpeg
          mingw-w64-ucrt-x86_64-curl
          mingw-w64-ucrt-x86_64-mbedtls
          mingw-w64-ucrt-x86_64-jansson
          mingw-w64-ucrt-x86_64-libpng
          mingw-w64-ucrt-x86_64-opus
          mingw-w64-ucrt-x86_64-expat
          mingw-w64-ucrt-x86_64-zstd
          mingw-w64-ucrt-x86_64-ntldd-git

    - name: Configure
      shell: pwsh
      run: C:\msys64\ucrt64\bin\cmake.exe --preset windows-ucrt64-release

    - name: Build
      shell: pwsh
      run: C:\msys64\ucrt64\bin\cmake.exe --build --preset windows-ucrt64-release --parallel

    - name: Collect runtime DLLs
      shell: msys2 {0}
      run: |
        exe="$(cygpath -u "$GITHUB_WORKSPACE")/build/windows-ucrt64/Moonlight.exe"
        outdir="$(dirname "$exe")"
        ntldd -R "$exe" | awk '/=> \/ucrt64\/bin\// { print $3 }' | sort -u | while read -r dll; do
          cp -f "$dll" "$outdir/"
        done

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Moonlight-windows-ucrt64
        path: |
          build/windows-ucrt64/Moonlight.exe
          build/windows-ucrt64/*.dll
          build/windows-ucrt64/resources/**