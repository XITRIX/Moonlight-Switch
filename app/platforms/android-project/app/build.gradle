plugins {
    id 'com.android.application'
}

def buildWithCMake = project.hasProperty('BUILD_WITH_CMAKE');

android {
    namespace = "com.borealis.demo"
    compileSdkVersion 35
    ndkVersion "29.0.14206865"
    defaultConfig {
        minSdkVersion 21
        targetSdkVersion 35
        versionCode 1
        versionName "1.0"
        externalNativeBuild {
            ndkBuild {
                arguments "APP_PLATFORM=android-21"
                abiFilters 'armeabi-v7a', 'arm64-v8a'
            }
            cmake {
                arguments "-DANDROID_PLATFORM=android-21", "-DANDROID_STL=c++_static"
                abiFilters 'armeabi-v7a', 'arm64-v8a'
            }
        }
    }
    packaging {
        jniLibs {
            useLegacyPackaging false
            excludes.add("**/libEGL_angle.so")
            excludes.add("**/libGLESv2_angle.so")
            pickFirsts.add("**/*.so")
        }
    }
    buildTypes {
        debug {
            if (project.hasProperty('UNSIGNED_DEBUG')) {
                signingConfig = null
            }
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    if (!project.hasProperty('EXCLUDE_NATIVE_LIBS')) {
        sourceSets.main {
            jniLibs.srcDirs = ['libs']
        }
        externalNativeBuild {
            cmake {
                path 'jni/CMakeLists.txt'
            }
        }
    }
    lint {
        abortOnError = false
    }
}

androidComponents {
    onVariants(selector().all()) { variant ->
        def capitalizedVariantName = variant.name.capitalize()
        tasks.matching { it.name == "merge${capitalizedVariantName}Assets" }.configureEach {
            dependsOn("externalNativeBuild${capitalizedVariantName}")
        }
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
}
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}